<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>jQuery Page</title>

  <link rel="stylesheet" href="styles.css">

  <!-- jQuery CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>

  <h1>My jQuery Practice Page</h1>

  <p>Welcome to my interactive jQuery page!</p>

  <img src="Images/With Mom.jpeg" alt="image">

  <hr> 

  <!-- Interaction 1 -->
  <button id="hideBtn">Hide Box</button>
  <div id="box">Hello World</div>

  <hr>

  <!-- Interaction 2 -->
  <button id="fadeBtn">Fade Box</button>

  <hr>

  <!-- Interaction 3 -->
  <button id="textBtn">Change Text</button>

  <hr>

  <!-- Interaction 4 -->
  <input type="text" id="nameInput" placeholder="Enter name">
  <button id="submitBtn">Submit</button>
  <p id="output"></p>

  <script src="script.js"></script>

</body>
</html>
